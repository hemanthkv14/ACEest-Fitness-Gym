# ------------------------------------------------------------------
# Strategy 1: ROLLING UPDATE (default Kubernetes Deployment strategy)
# ------------------------------------------------------------------
# Pods are replaced incrementally (maxSurge=1, maxUnavailable=0) so the
# service stays available during the upgrade. Rollback is a single
# command:  kubectl -n aceest rollout undo deployment/aceest-rolling
# ------------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-rolling
  namespace: aceest
  labels:
    app: aceest-fitness-gym
    strategy: rolling
spec:
  replicas: 4
  revisionHistoryLimit: 10
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: aceest-fitness-gym
      strategy: rolling
  template:
    metadata:
      labels:
        app: aceest-fitness-gym
        strategy: rolling
        version: v1
    spec:
      containers:
        - name: aceest
          image: DOCKERHUB_USER/aceest-fitness-gym:v1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
          env:
            - name: FLASK_ENV
              value: production
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
