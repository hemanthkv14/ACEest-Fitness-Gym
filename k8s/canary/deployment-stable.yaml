# ------------------------------------------------------------------
# Strategy 3a: CANARY -- stable track (v1) -- 90% of traffic
# ------------------------------------------------------------------
# Both stable and canary Deployments share the `app` label, so the
# common Service fans out to every pod. Traffic split is controlled by
# the replica ratio: stable=9 + canary=1 gives ~90/10.
# ------------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-stable
  namespace: aceest
  labels:
    app: aceest-fitness-gym
    strategy: canary
    track: stable
spec:
  replicas: 9
  selector:
    matchLabels:
      app: aceest-fitness-gym
      track: stable
  template:
    metadata:
      labels:
        app: aceest-fitness-gym
        strategy: canary
        track: stable
        version: v1
    spec:
      containers:
        - name: aceest
          image: DOCKERHUB_USER/aceest-fitness-gym:v1
          ports: [{ containerPort: 5000 }]
          env:
            - name: APP_VERSION
              value: "stable-v1"
          readinessProbe:
            httpGet: { path: /health, port: 5000 }
            initialDelaySeconds: 3
            periodSeconds: 5
