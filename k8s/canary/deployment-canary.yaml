# ------------------------------------------------------------------
# Strategy 3b: CANARY -- canary track (v2) -- 10% of traffic
# ------------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-canary
  namespace: aceest
  labels:
    app: aceest-fitness-gym
    strategy: canary
    track: canary
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aceest-fitness-gym
      track: canary
  template:
    metadata:
      labels:
        app: aceest-fitness-gym
        strategy: canary
        track: canary
        version: v2
    spec:
      containers:
        - name: aceest
          image: DOCKERHUB_USER/aceest-fitness-gym:v2
          ports: [{ containerPort: 5000 }]
          env:
            - name: APP_VERSION
              value: "canary-v2"
          readinessProbe:
            httpGet: { path: /health, port: 5000 }
            initialDelaySeconds: 3
            periodSeconds: 5
