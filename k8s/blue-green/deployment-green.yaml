# ------------------------------------------------------------------
# Strategy 2b: BLUE-GREEN  -- GREEN (new candidate)
# ------------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-green
  namespace: aceest
  labels:
    app: aceest-fitness-gym
    strategy: blue-green
    version: green
spec:
  replicas: 3
  selector:
    matchLabels:
      app: aceest-fitness-gym
      version: green
  template:
    metadata:
      labels:
        app: aceest-fitness-gym
        strategy: blue-green
        version: green
    spec:
      containers:
        - name: aceest
          image: DOCKERHUB_USER/aceest-fitness-gym:v2
          ports: [{ containerPort: 5000 }]
          env:
            - name: APP_VERSION
              value: "green-v2"
          readinessProbe:
            httpGet: { path: /health, port: 5000 }
            initialDelaySeconds: 3
            periodSeconds: 5
