name: ACEest CI/CD Pipeline

on:
  push:
    branches: [ main, master, develop, "feature/*" ]
    tags:    [ "v*" ]
  pull_request:
    branches: [ main, master ]

env:
  IMAGE_NAME: aceest-fitness-gym

jobs:

  # ---------------------------------------------------------------
  # Stage 1: Build & Lint
  # ---------------------------------------------------------------
  build-and-lint:
    name: Build & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Lint with flake8
        run: |
          flake8 app.py --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 app.py --count --max-line-length=120 --statistics --exit-zero

  # ---------------------------------------------------------------
  # Stage 2: Automated Testing (+ coverage for SonarQube)
  # ---------------------------------------------------------------
  test:
    name: Automated Testing
    runs-on: ubuntu-latest
    needs: build-and-lint
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run Pytest with coverage
        run: |
          pytest tests/ -v --tb=short \
            --cov=app --cov-report=xml:coverage.xml \
            --junitxml=test-results.xml
      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            coverage.xml
            test-results.xml

  # ---------------------------------------------------------------
  # Stage 3: SonarQube analysis (skipped if secrets are not set)
  # ---------------------------------------------------------------
  sonar:
    name: SonarQube Analysis
    runs-on: ubuntu-latest
    needs: test
    if: ${{ github.event_name == 'push' }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/download-artifact@v4
        with:
          name: test-reports
      - name: SonarQube Scan
        if: ${{ env.SONAR_TOKEN != '' }}
        uses: SonarSource/sonarqube-scan-action@v4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  # ---------------------------------------------------------------
  # Stage 4: Docker build + push to Docker Hub
  # ---------------------------------------------------------------
  docker:
    name: Docker Image & Push
    runs-on: ubuntu-latest
    needs: test
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Docker Hub login
        if: ${{ github.event_name == 'push' && env.DOCKERHUB_USERNAME != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Extract metadata (tags)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_USERNAME && format('{0}/{1}', env.DOCKERHUB_USERNAME, env.IMAGE_NAME) || env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Build (always) and Push (only on main/tag)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name == 'push' && env.DOCKERHUB_USERNAME != '' }}
          load: ${{ github.event_name != 'push' || env.DOCKERHUB_USERNAME == '' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
      - name: Run tests inside container
        run: |
          IMAGE=$(echo "${{ steps.meta.outputs.tags }}" | head -n1)
          docker run --rm "$IMAGE" python -m pytest tests/ -v --tb=short
