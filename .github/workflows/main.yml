name: ACEest CI/CD Pipeline

on:
  push:
    branches: [ main, develop, "feature/*" ]
  pull_request:
    branches: [ main ]

jobs:

  # Stage 1: Build & Lint
  build-and-lint:
    name: Build & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with flake8
        run: |
          # Stop the build if there are Python syntax errors or undefined names
          flake8 app.py --count --select=E9,F63,F7,F82 --show-source --statistics
          # Treat all other warnings as non-fatal for now
          flake8 app.py --count --max-line-length=120 --statistics --exit-zero

  # Stage 2: Run Tests
  test:
    name: Automated Testing
    runs-on: ubuntu-latest
    needs: build-and-lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Pytest suite
        run: |
          pytest tests/ -v --tb=short

  # Stage 3: Docker Image Assembly
  docker-build:
    name: Docker Image Assembly
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t aceest-fitness-gym:${{ github.sha }} .

      - name: Verify Docker image
        run: |
          docker images aceest-fitness-gym

      - name: Run tests inside container
        run: |
          docker run --rm aceest-fitness-gym:${{ github.sha }} python -m pytest tests/ -v --tb=short
